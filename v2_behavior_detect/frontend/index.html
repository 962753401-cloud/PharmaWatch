<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>药店监控AI v2 行为特征检测</title>
  <link rel="preconnect" href="https://unpkg.com" />
  <script>
    // Lucide icons loaded from CDN; if CDN is unreachable, define a no-op stub
    // so the rest of the page JavaScript still works.
    window.lucide = { createIcons: function(){} };
  </script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer
           onerror="void(0)"></script>
  <style>
    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --border: #e0e4ea;
      --text: #1a1f2e;
      --muted: #6b7385;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-soft: rgba(37,99,235,0.08);
      --danger: #dc2626;
      --warning: #d97706;
      --warning-bg: #fef3c7;
      --success: #16a34a;
      --success-bg: #dcfce7;
      --crowd: #2563eb;
      --loiter: #d97706;
      --carry: #16a34a;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.55;
      min-height: 100vh;
    }
    header {
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 17px; margin: 0; font-weight: 600; }
    header .subtitle { color: var(--muted); font-size: 12px; }
    header .health { margin-left: auto; color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 6px; }
    header .health .dot { width: 8px; height: 8px; border-radius: 50%; background: #c8cdd6; }
    header .health.ok .dot { background: var(--success); }
    header .health.err .dot { background: var(--danger); }
    main { display: grid; grid-template-columns: minmax(320px, 400px) 1fr; gap: 20px; padding: 20px 28px 40px; max-width: 1400px; margin: 0 auto; }
    @media (max-width: 960px) { main { grid-template-columns: 1fr; } }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); }
    .card + .card { margin-top: 14px; }
    .card h2 { margin: 0 0 10px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .card h2 .lucide { color: var(--primary); width: 15px; height: 15px; }
    .label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .input-row input[type="text"] { flex: 1; padding: 9px 12px; border-radius: 6px; border: 1px solid var(--border); font-family: inherit; font-size: 13px; background: var(--surface); color: var(--text); }
    .input-row input[type="text"]:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-soft); }
    .dropzone { border: 1.5px dashed var(--border); border-radius: var(--radius); padding: 20px 14px; text-align: center; color: var(--muted); cursor: pointer; transition: border-color 0.15s, background 0.15s; }
    .dropzone:hover, .dropzone.drag { border-color: var(--primary); background: var(--primary-soft); }
    .dropzone .lucide { width: 20px; height: 20px; color: var(--primary); }
    .dropzone .filename { color: var(--text); font-weight: 500; margin-top: 5px; word-break: break-all; font-size: 12px; }
    .divider { text-align: center; color: var(--muted); font-size: 11px; margin: 12px 0; position: relative; }
    .divider::before, .divider::after { content: ""; position: absolute; top: 50%; width: 35%; height: 1px; background: var(--border); }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 10px 16px; border-radius: 6px; border: 1px solid var(--primary); background: var(--primary); color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s, opacity 0.15s; }
    .btn:hover:not(:disabled) { background: var(--primary-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint { font-size: 11px; color: var(--muted); margin-top: 8px; }
    .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; margin-top: 8px; }
    .config-item { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; }
    .config-item span:last-child { color: var(--text); font-weight: 500; }
    .progress-section { margin-top: 0; }
    .progress-bar-outer { width: 100%; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; margin-top: 4px; }
    .progress-bar-inner { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.3s ease; width: 0%; }
    .progress-stats { display: flex; gap: 20px; margin-top: 10px; font-size: 12px; }
    .progress-stat { display: flex; flex-direction: column; }
    .progress-stat .val { font-size: 18px; font-weight: 600; color: var(--text); }
    .progress-stat .lbl { font-size: 11px; color: var(--muted); }
    .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; }
    .status-badge.scanning { background: var(--primary-soft); color: var(--primary); }
    .status-badge.done { background: var(--success-bg); color: var(--success); }
    .status-badge.error { background: #fee2e2; color: var(--danger); }
    .results { display: flex; flex-direction: column; gap: 12px; }
    .clip-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); }
    .clip-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .clip-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; color: #fff; }
    .clip-badge.crowd { background: var(--crowd); }
    .clip-badge.loiter { background: var(--loiter); }
    .clip-badge.carry { background: var(--carry); }
    .clip-time { font-size: 13px; font-weight: 600; color: var(--text); }
    .clip-details { font-size: 12px; color: var(--muted); }
    .clip-duration { font-size: 11px; color: var(--muted); margin-left: auto; }
    .clip-video { width: 100%; max-height: 300px; border-radius: 6px; background: #000; margin-top: 4px; }
    .clip-actions { display: flex; gap: 8px; margin-top: 8px; }
    .clip-actions a { font-size: 12px; color: var(--primary); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
    .clip-actions a:hover { text-decoration: underline; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-state .lucide { width: 32px; height: 32px; opacity: 0.3; margin-bottom: 8px; }
    .form-error { color: var(--danger); font-size: 12px; margin-top: 8px; min-height: 16px; }
    .trigger-legend { display: flex; gap: 14px; margin-top: 8px; flex-wrap: wrap; }
    .trigger-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
    .trigger-legend-dot { width: 10px; height: 10px; border-radius: 3px; }
    .hidden { display: none !important; }

    .live-preview { margin-top: 12px; }
    .live-preview img { width: 100%; border-radius: 6px; background: #000; }
    .live-preview .preview-overlay { position: relative; }
    .live-preview .preview-label { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
    .events-panel { margin-top: 0; }
    .events-list { max-height: 280px; overflow-y: auto; margin-top: 8px; }
    .event-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-bottom: 1px solid var(--border); font-size: 12px; }
    .event-row:last-child { border-bottom: none; }
    .event-row.new { background: var(--primary-soft); animation: flash 1s ease 2; }
    @keyframes flash { 0%,100% { background: var(--primary-soft); } 50% { background: transparent; } }
    .event-time { font-weight: 600; color: var(--text); min-width: 64px; font-variant-numeric: tabular-nums; }
    .event-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 600; color: #fff; }
    .event-badge.crowd { background: var(--crowd); }
    .event-badge.loiter { background: var(--loiter); }
    .event-badge.carry { background: var(--carry); }
    .event-details { color: var(--muted); flex: 1; }

  </style>
</head>
<body>
  <header>
    <h1>药店监控AI v2 行为特征检测</h1>
    <span class="subtitle">YOLO-World + Supervision 倍速扫描 自动切片</span>
    <span class="health" id="health">
      <span class="dot"></span>
      <span id="health-text">检查中...</span>
    </span>
  </header>

  <main>
    <!-- Left: Input panel -->
    <div>
      <div class="card">
        <h2><i data-lucide="upload-cloud"></i> 视频输入</h2>

        <div class="dropzone" id="dropzone">
          <i data-lucide="film"></i>
          <div>点击或拖拽上传视频文件</div>
          <div class="filename" id="upload-filename"></div>
        </div>
        <input type="file" id="file-input" accept="video/*" class="hidden" />

        <div class="divider">或输入本地路径</div>

        <div class="input-row">
          <input type="text" id="path-input" placeholder="D:\...\视频.mp4" />
        </div>

        <div style="margin-top: 12px;">
          <button class="btn" id="start-btn" disabled>
            <i data-lucide="play" style="width:16px;height:16px;"></i>
            <span>开始分析</span>
          </button>
        </div>

        <div class="form-error" id="form-error"></div>
      </div>

      <div class="card">
        <h2><i data-lucide="settings-2"></i> 触发器配置</h2>
        <div class="config-grid" id="config-grid">
          <div class="config-item"><span>人群阈值</span><span id="cfg-crowd">-</span></div>
          <div class="config-item"><span>连续帧数</span><span id="cfg-consec">-</span></div>
          <div class="config-item"><span>停留时长</span><span id="cfg-loiter">-</span></div>
          <div class="config-item"><span>停留半径</span><span id="cfg-radius">-</span></div>
          <div class="config-item"><span>切片半长</span><span id="cfg-half">-</span></div>
          <div class="config-item"><span>最大时长</span><span id="cfg-max">-</span></div>
        </div>
        <div class="trigger-legend">
          <div class="trigger-legend-item"><span class="trigger-legend-dot" style="background:var(--crowd)"></span> 人群聚集</div>
          <div class="trigger-legend-item"><span class="trigger-legend-dot" style="background:var(--loiter)"></span> 人员停留</div>
          <div class="trigger-legend-item"><span class="trigger-legend-dot" style="background:var(--carry)"></span> 携带物品</div>
        </div>
      </div>
    </div>

    <!-- Right: Progress + Results -->
    <div>
      <div class="card progress-section" id="progress-card" style="display:none;">
        <h2><i data-lucide="activity"></i> 扫描进度</h2>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="status-badge scanning" id="status-badge">扫描中</span>
          <span style="font-size:12px;color:var(--muted);" id="status-text">正在加载模型...</span>
        </div>
        <div class="progress-bar-outer">
          <div class="progress-bar-inner" id="progress-bar"></div>
        </div>
        <div class="progress-stats">
          <div class="progress-stat">
            <span class="val" id="stat-progress">0%</span>
            <span class="lbl">扫描进度</span>
          </div>
          <div class="progress-stat">
            <span class="val" id="stat-time">00:00</span>
            <span class="lbl">当前时间</span>
          </div>
          <div class="progress-stat">
            <span class="val" id="stat-total">00:00</span>
            <span class="lbl">视频总长</span>
          </div>
          <div class="progress-stat">
            <span class="val" id="stat-triggers">0</span>
            <span class="lbl">已发现触发</span>
          </div>
        </div>
      </div>

      <div class="card" id="preview-card" style="display:none;">
        <h2><i data-lucide="eye"></i> 实时分析预览</h2>
        <div class="live-preview">
          <div class="preview-overlay">
            <img id="preview-img" src="" alt="YOLO-World" style="width:100%;border-radius:6px;" />
          </div>
        </div>
      </div>

      <div class="card" id="results-card">
        <h2><i data-lucide="scissors"></i> 切片结果</h2>

        <div class="events-panel">
          <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">触发器事件</div>
          <div class="events-list" id="events-list">
            <div id="empty-events" style="text-align:center;padding:16px;color:var(--muted);font-size:12px;">等待检测...</div>
          </div>
        </div>

        <div class="results" id="results-list">
          <div class="empty-state" id="empty-state">
            <i data-lucide="video-off"></i>
            <div>提交视频后，切片结果将显示在这里</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    let selectedFile = null;
    let pollTimer = null;
    let currentTaskId = null;

    // --- Init ---
    // Safe icon init (no-op if lucide stub is in place from failed CDN load)
    try { if (window.lucide && window.lucide.createIcons) lucide.createIcons(); } catch(e){}
    checkHealth();

    // --- Health check ---
    async function checkHealth() {
      try {
        const resp = await fetch("/api/health");
        const data = await resp.json();
        const el = document.getElementById("health");
        const txt = document.getElementById("health-text");
        if (data.status === "ok" && data.weights_exists) {
          el.classList.add("ok");
          txt.textContent = "模型就绪";
        } else {
          el.classList.add("err");
          txt.textContent = data.weights_exists ? "服务就绪" : "模型权重缺失";
        }
        // Populate config display
        document.getElementById("cfg-crowd").textContent = ">=" + data.triggers.crowd.threshold + " 人";
        document.getElementById("cfg-consec").textContent = data.triggers.crowd.consecutive + " 帧";
        document.getElementById("cfg-loiter").textContent = data.triggers.loiter.seconds + " 秒";
        document.getElementById("cfg-radius").textContent = data.triggers.loiter.radius_px + " px";
        document.getElementById("cfg-half").textContent = data.slice.half_seconds + " 秒";
        document.getElementById("cfg-max").textContent = data.slice.max_seconds + " 秒";
      } catch (e) {
        document.getElementById("health").classList.add("err");
        document.getElementById("health-text").textContent = "服务未启动";
      }
    }

    // --- File upload ---
    const dropzone = document.getElementById("dropzone");
    const fileInput = document.getElementById("file-input");
    const pathInput = document.getElementById("path-input");
    const startBtn = document.getElementById("start-btn");
    const formError = document.getElementById("form-error");

    dropzone.addEventListener("click", () => fileInput.click());
    dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("drag"); });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag"));
    dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropzone.classList.remove("drag");
      if (e.dataTransfer.files.length) {
        handleFileSelect(e.dataTransfer.files[0]);
      }
    });
    fileInput.addEventListener("change", (e) => {
      if (e.target.files.length) handleFileSelect(e.target.files[0]);
    });

    function handleFileSelect(file) {
      selectedFile = file;
      document.getElementById("upload-filename").textContent = file.name + " (" + (file.size / 1048576).toFixed(1) + "MB)";
      pathInput.value = "";
      updateStartBtn();
    }

    pathInput.addEventListener("input", () => {
      if (pathInput.value.trim()) {
        selectedFile = null;
        document.getElementById("upload-filename").textContent = "";
      }
      updateStartBtn();
    });

    function updateStartBtn() {
      startBtn.disabled = !selectedFile && !pathInput.value.trim();
    }

    // --- Start analysis ---
    startBtn.addEventListener("click", async () => {
      formError.textContent = "";
      startBtn.disabled = true;
      startBtn.innerHTML = '<span class="spinner"></span><span>提交中...</span>';

      try {
        let resp;
        if (selectedFile) {
          const formData = new FormData();
          formData.append("video", selectedFile);
          resp = await fetch("/api/analyze", { method: "POST", body: formData });
        } else {
          resp = await fetch("/api/analyze/path", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ video_path: pathInput.value.trim() }),
          });
        }

        if (!resp.ok) {
          let errMsg = "服务器错误 (HTTP " + resp.status + ")";
          try { const e = await resp.json(); errMsg = e.message || e.error || errMsg; } catch(_){}
          formError.textContent = errMsg;
          resetStartBtn();
          return;
        }

        const data = await resp.json();
        if (!data.ok && data.ok !== undefined) {
          formError.textContent = data.message || data.error || "提交失败";
          resetStartBtn();
          return;
        }

        currentTaskId = data.task_id;
        document.getElementById("progress-card").style.display = "";
        document.getElementById("empty-state").classList.add("hidden");
        startPreview(data.task_id);
        startPolling(data.task_id);
      } catch (e) {
        formError.textContent = "网络错误: " + e.message;
        resetStartBtn();
      }
    });

    function resetStartBtn() {
      startBtn.disabled = false;
      startBtn.innerHTML = '<i data-lucide="play" style="width:16px;height:16px;"></i><span>开始分析</span>';
      try { if (window.lucide && window.lucide.createIcons) lucide.createIcons(); } catch(e){}
    }

    // --- Polling ---
    function startPolling(taskId) {
      if (pollTimer) clearInterval(pollTimer);
      pollTask(taskId);
      pollTimer = setInterval(() => pollTask(taskId), 2000);
    }

    async function pollTask(taskId) {
      try {
        const resp = await fetch("/api/task/" + taskId);
        if (!resp.ok) return;
        const data = await resp.json();
        updateProgress(data);
        updateEvents(data);
        updateResults(data);
        if (data.status === "done" || data.status === "error") {
          clearInterval(pollTimer);
          pollTimer = null;
          stopPreview();
          resetStartBtn();
          if (data.status === "error") {
            document.getElementById("status-text").textContent = data.error || "扫描出错";
          }
        }
      } catch (e) {
        console.error("Poll error:", e);
      }
    }

    function updateProgress(data) {
      const bar = document.getElementById("progress-bar");
      bar.style.width = data.progress + "%";
      document.getElementById("stat-progress").textContent = data.progress.toFixed(1) + "%";
      document.getElementById("stat-time").textContent = formatTime(data.current_time);
      document.getElementById("stat-total").textContent = formatTime(data.total_time);
      document.getElementById("stat-triggers").textContent = data.triggers_found;

      const badge = document.getElementById("status-badge");
      const statusText = document.getElementById("status-text");
      badge.className = "status-badge " + data.status;
      if (data.status === "scanning") {
        badge.textContent = "扫描中";
        statusText.textContent = "正在分析视频帧...";
      } else if (data.status === "done") {
        badge.textContent = "完成";
        statusText.textContent = "扫描完成";
      } else if (data.status === "error") {
        badge.textContent = "错误";
        statusText.textContent = data.error || "扫描出错";
      }
    }

    function updateResults(data) {
      const list = document.getElementById("results-list");
      const empty = document.getElementById("empty-state");
      if (data.clips && data.clips.length > 0) {
        if (empty) empty.classList.add("hidden");
        // Render clips (only add new ones)
        const existing = list.querySelectorAll(".clip-card");
        if (existing.length === data.clips.length) return; // no new clips
        list.innerHTML = "";
        data.clips.forEach((clip) => {
          list.appendChild(createClipCard(clip));
        });
        try { if (window.lucide && window.lucide.createIcons) lucide.createIcons(); } catch(e){}
      }
    }

    function createClipCard(clip) {
      const card = document.createElement("div");
      card.className = "clip-card";

      const typeLabels = { crowd: "人群聚集", loiter: "人员停留", carry: "携带物品" };
      const ts = formatTime(clip.timestamp);

      card.innerHTML = `
        <div class="clip-header">
          <span class="clip-badge ${clip.trigger_type}">${typeLabels[clip.trigger_type] || clip.trigger_type}</span>
          <span class="clip-time">${ts}</span>
          <span class="clip-details">${clip.details || ""}</span>
          <span class="clip-duration">${clip.duration.toFixed(0)}s 切片</span>
        </div>
        <video class="clip-video" controls preload="metadata">
          <source src="${clip.download_url}" type="video/mp4" />
        </video>
        <div class="clip-actions">
          <a href="${clip.download_url}" download="${clip.filename}">
            <i data-lucide="download" style="width:14px;height:14px;"></i> 下载
          </a>
          <a href="${clip.download_url}" target="_blank">
            <i data-lucide="external-link" style="width:14px;height:14px;"></i> 新窗口打开
          </a>
        </div>
      `;
      return card;
    }

    // --- Live preview ---
    let previewTimer = null;
    function startPreview(taskId) {
      const card = document.getElementById("preview-card");
      card.style.display = "";
      if (previewTimer) clearInterval(previewTimer);
      fetchPreview(taskId);
      previewTimer = setInterval(function(){ fetchPreview(taskId); }, 600);
    }
    function stopPreview() {
      if (previewTimer) { clearInterval(previewTimer); previewTimer = null; }
    }
    async function fetchPreview(taskId) {
      try {
        const resp = await fetch("/api/task/" + taskId + "/frame/latest");
        if (!resp.ok) return;
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const img = document.getElementById("preview-img");
        if (img.src && img.src.startsWith("blob:")) URL.revokeObjectURL(img.src);
        img.src = url;
      } catch(e) {}
    }

    // --- Events list ---
    let lastEventCount = 0;
    function updateEvents(data) {
      const events = data.events || [];
      const list = document.getElementById("events-list");
      const empty = document.getElementById("empty-events");
      if (events.length === 0) {
        if (empty) empty.style.display = "";
        return;
      }
      if (empty) empty.style.display = "none";
      if (events.length === lastEventCount) return;
      const prevCount = lastEventCount;
      lastEventCount = events.length;
      list.innerHTML = "";
      const typeLabels = { crowd: "人群聚集", loiter: "坐姿停留", carry: "人+手机" };
      events.forEach(function(evt, i) {
        const row = document.createElement("div");
        row.className = "event-row" + (i >= prevCount ? " new" : "");
        const badge = document.createElement("span");
        badge.className = "event-badge " + evt.trigger_type;
        badge.textContent = typeLabels[evt.trigger_type] || evt.trigger_type;
        const time = document.createElement("span");
        time.className = "event-time";
        time.textContent = formatTime(evt.timestamp);
        const details = document.createElement("span");
        details.className = "event-details";
        details.textContent = evt.details || "";
        row.appendChild(time);
        row.appendChild(badge);
        row.appendChild(details);
        list.appendChild(row);
      });
      list.scrollTop = list.scrollHeight;
    }

    function formatTime(seconds) {
      if (!seconds || seconds < 0) return "00:00";
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = Math.floor(seconds % 60);
      if (h > 0) return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
      return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    }
  </script>
</body>
</html>
